
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Counter V02</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #f5f5f5;
      --fg: #111;
      --card-bg: #fff;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    body.dark {
      --bg: #020617;
      --fg: #e5e7eb;
      --card-bg: #020617;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --border: #1f2937;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background 0.2s, color 0.2s;
    }

    .app {
      width: 100%;
      max-width: 460px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      padding: 20px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .dark-toggle {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.75rem;
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .section {
      margin-top: 16px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-size: 0.85rem;
    }

    button.primary {
      margin-top: 6px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      margin-top: 4px;
      width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .counter-card {
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      border: 1px dashed var(--border);
      display: none;
    }

    .counter-value {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .tap-button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .avatar-box {
      margin-top: 12px;
      text-align: center;
    }

    .avatar-img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--border);
      object-fit: cover;
      display: inline-block;
    }

    .achievement-img {
      width: 80px;
      margin-top: 10px;
      display: none;
    }

    .logout-btn {
      margin-top: 8px;
      font-size: 0.75rem;
      text-align: right;
      cursor: pointer;
      opacity: 0.7;
    }

    .status {
      margin-top: 8px;
      font-size: 0.75rem;
      min-height: 16px;
      opacity: 0.8;
    }

    .status.error { color: #ef4444; opacity: 1; }
    .status.success { color: #22c55e; opacity: 1; }

  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="title">Tap Counter V02</div>
        <div class="subtitle">Now with avatars + achievements</div>
      </div>
      <button id="darkToggle" class="dark-toggle">
        <span>🌙</span>
        <span id="darkLabel">Dark</span>
      </button>
    </div>

    <div id="authSection" class="section">
      <div class="section-title">Sign in or create account</div>
      <input id="email" type="email" placeholder="you@example.com" />
      <input id="password" type="password" placeholder="••••••••" />
      <button id="loginBtn" class="primary">Sign in</button>
      <button id="signupBtn" class="secondary">Create account</button>
    </div>

    <div id="counterCard" class="counter-card">
      <div class="avatar-box">
        <img id="avatarImg" class="avatar-img" src="" alt="avatar" />
        <input id="avatarInput" type="file" accept="image/*" style="margin-top:8px;" />
        <button id="uploadAvatarBtn" class="secondary">Upload Avatar</button>
      </div>

      <div class="counter-value" id="counterValue">0</div>
      <button id="tapBtn" class="tap-button">Tap +1</button>

      <img id="achievementImg" class="achievement-img" src="" alt="achievement" />

      <div class="logout-btn" id="logoutBtn">Sign out</div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    const API = "https://flask0001app00remote00repository.onrender.com";

    const authSection = document.getElementById("authSection");
    const counterCard = document.getElementById("counterCard");
    const counterValueEl = document.getElementById("counterValue");
    const statusEl = document.getElementById("status");
    const avatarImg = document.getElementById("avatarImg");
    const achievementImg = document.getElementById("achievementImg");

    function setStatus(msg, type="") {
      statusEl.textContent = msg;
      statusEl.className = "status " + type;
    }

    function getToken() { return localStorage.getItem("token"); }
    function setToken(t) { localStorage.setItem("token", t); }
    function clearToken() { localStorage.removeItem("token"); }

    function authHeaders() {
      const t = getToken();
      return t ? { "Authorization": "Bearer " + t } : {};
    }

    function showSignedIn() {
      authSection.style.display = "none";
      counterCard.style.display = "block";
    }

    function showSignedOut() {
      authSection.style.display = "block";
      counterCard.style.display = "none";
    }

    async function loadCounter() {
      const res = await fetch(`${API}/counter`, { headers: authHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      counterValueEl.textContent = data.count;

      // achievement logic
      let img = "";
      if (data.count >= 32) img = "achievement4.jpg";
      else if (data.count >= 16) img = "achievement3.jpg";
      else if (data.count >= 8) img = "achievement2.jpg";
      else if (data.count >= 4) img = "achievement1.jpg";

      if (img) {
        achievementImg.src = img;
        achievementImg.style.display = "block";
      } else {
        achievementImg.style.display = "none";
      }
    }

    document.getElementById("tapBtn").onclick = async () => {
      const res = await fetch(`${API}/counter`, {
        method: "POST",
        headers: authHeaders()
      });
      if (!res.ok) return;
      const data = await res.json();
      counterValueEl.textContent = data.count;
      setStatus("Tap recorded", "success");
      loadCounter();
    };

    document.getElementById("logoutBtn").onclick = () => {
      clearToken();
      showSignedOut();
    };

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        setStatus("Login failed", "error");
        return;
      }

      const data = await res.json();
      setToken(data.token);
      showSignedIn();
      loadCounter();
    };

    document.getElementById("signupBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const res = await fetch(`${API}/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        setStatus("Signup failed", "error");
        return;
      }

      setStatus("Account created. Sign in now.", "success");
    };

    document.getElementById("uploadAvatarBtn").onclick = async () => {
      const file = document.getElementById("avatarInput").files[0];
      if (!file) return;

      const fd = new FormData();
      fd.append("file", file);

      const res = await fetch(`${API}/upload-avatar`, {
        method: "POST",
        headers: authHeaders(),
        body: fd
      });

      if (!res.ok) {
        setStatus("Avatar upload failed", "error");
        return;
      }

      const data = await res.json();
      avatarImg.src = data.url;
      setStatus("Avatar updated", "success");
    };

    async function init() {
      const token = getToken();
      if (!token) return showSignedOut();

      const res = await fetch(`${API}/session`, { headers: authHeaders() });
      const data = await res.json();

      if (!data.logged_in) {
        clearToken();
        return showSignedOut();
      }

      showSignedIn();
      loadCounter();
    }

    init();
  </script>
</body>
</html>
