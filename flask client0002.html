
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Counter (Flask Version)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #f5f5f5;
      --fg: #111111;
      --card-bg: #ffffff;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    body.dark {
      --bg: #020617;
      --fg: #e5e7eb;
      --card-bg: #020617;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --border: #1f2937;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .app {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      padding: 20px 20px 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .dark-toggle {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.75rem;
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .section {
      margin-top: 16px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    label {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-size: 0.85rem;
    }

    button.primary {
      margin-top: 6px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      margin-top: 4px;
      width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .counter-card {
      margin-top: 12px;
      padding: 14px 14px 16px;
      border-radius: 12px;
      border: 1px dashed var(--border);
      display: none;
    }

    .counter-value {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .tap-button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .status {
      margin-top: 8px;
      font-size: 0.75rem;
      min-height: 16px;
      opacity: 0.8;
    }

    .status.error {
      color: #ef4444;
      opacity: 1;
    }

    .status.success {
      color: #22c55e;
      opacity: 1;
    }

    .top-right-status {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .logout-btn {
      margin-top: 8px;
      font-size: 0.75rem;
      text-align: right;
      cursor: pointer;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="title">Personal Tap Counter</div>
        <div class="subtitle">Each user has their own counter stored on your Flask server.</div>
      </div>
      <button id="darkToggle" class="dark-toggle">
        <span>🌙</span>
        <span id="darkLabel">Dark</span>
      </button>
    </div>

    <div id="authStatus" class="top-right-status">Not signed in</div>

    <div class="section" id="authSection">
      <div class="section-title">Sign in or create account</div>
      <form id="authForm" class="auth-form">
        <div>
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••" required />
        </div>
        <button id="signInBtn" class="primary" type="submit">Sign in</button>
        <button id="signUpBtn" class="secondary" type="button">Create new account</button>
      </form>
    </div>

    <div class="section counter-card" id="counterCard">
      <div class="counter-label">Your personal tap count</div>
      <div id="counterValue" class="counter-value">0</div>
      <button id="tapBtn" class="tap-button">Tap +1</button>
      <div class="logout-btn" id="logoutBtn">Sign out</div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    //const API = "http://localhost:5000";
    const API = "https://flask0001app00remote00repository.onrender.com";

    // -------------------------
    // DARK MODE
    // -------------------------
    const darkToggleBtn = document.getElementById("darkToggle");
    const darkLabel = document.getElementById("darkLabel");

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("dark");
        darkLabel.textContent = "Light";
        darkToggleBtn.firstElementChild.textContent = "☀️";
      } else {
        document.body.classList.remove("dark");
        darkLabel.textContent = "Dark";
        darkToggleBtn.firstElementChild.textContent = "🌙";
      }
    }

    applyTheme(localStorage.getItem("theme") || "light");

    darkToggleBtn.addEventListener("click", () => {
      const next = document.body.classList.contains("dark") ? "light" : "dark";
      localStorage.setItem("theme", next);
      applyTheme(next);
    });

    // -------------------------
    // UI ELEMENTS
    // -------------------------
    const authSection = document.getElementById("authSection");
    const counterCard = document.getElementById("counterCard");
    const counterValueEl = document.getElementById("counterValue");
    const statusEl = document.getElementById("status");
    const authStatusEl = document.getElementById("authStatus");

    function setStatus(msg, type = "") {
      statusEl.textContent = msg;
      statusEl.className = "status " + type;
      console.log("[STATUS]", msg, type);
    }

    function showSignedOut() {
      authSection.style.display = "block";
      counterCard.style.display = "none";
      authStatusEl.textContent = "Not signed in";
      console.log("[UI] showSignedOut");
    }

    function showSignedIn() {
      authSection.style.display = "none";
      counterCard.style.display = "block";
      authStatusEl.textContent = "Signed in";
      console.log("[UI] showSignedIn");
    }

    // -------------------------
    // TOKEN HELPERS
    // -------------------------
    function getToken() {
      const t = localStorage.getItem("token");
      console.log("[TOKEN] getToken =", t);
      return t;
    }

    function setToken(t) {
      console.log("[TOKEN] setToken =", t);
      localStorage.setItem("token", t);
    }

    function clearToken() {
      console.log("[TOKEN] clearToken");
      localStorage.removeItem("token");
    }

    function authHeaders() {
      const token = getToken();
      const headers = token ? { "Authorization": "Bearer " + token } : {};
      console.log("[HEADERS]", headers);
      return headers;
    }

    // -------------------------
    // LOAD COUNTER
    // -------------------------
    async function loadCounter() {
      console.log("[COUNTER] loadCounter start");
      const res = await fetch(`${API}/counter`, { headers: authHeaders() });
      console.log("[COUNTER] /counter status", res.status);

      if (!res.ok) {
        const text = await res.text();
        console.log("[COUNTER] error body", text);
        setStatus("Error loading counter", "error");
        return;
      }

      const data = await res.json();
      console.log("[COUNTER] data", data);
      counterValueEl.textContent = data.count;
      setStatus("Counter ready", "success");
    }

    // -------------------------
    // TAP BUTTON
    // -------------------------
    document.getElementById("tapBtn").addEventListener("click", async () => {
      console.log("[TAP] click");
      const res = await fetch(`${API}/counter`, {
        method: "POST",
        headers: authHeaders()
      });
      console.log("[TAP] /counter POST status", res.status);

      if (!res.ok) {
        const text = await res.text();
        console.log("[TAP] error body", text);
        setStatus("Error updating counter", "error");
        return;
      }

      const data = await res.json();
      console.log("[TAP] data", data);
      counterValueEl.textContent = data.count;
      setStatus("Tap recorded", "success");
    });

    // -------------------------
    // LOGOUT
    // -------------------------
    document.getElementById("logoutBtn").addEventListener("click", () => {
      console.log("[LOGOUT] click");
      clearToken();
      showSignedOut();
      setStatus("Signed out", "success");
    });

    // -------------------------
    // LOGIN
    // -------------------------
    document.getElementById("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      console.log("[LOGIN] submit", { email });
      setStatus("Signing in...");

      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      console.log("[LOGIN] /login status", res.status);

      if (!res.ok) {
        const errText = await res.text();
        console.log("[LOGIN] error body", errText);
        let err;
        try { err = JSON.parse(errText); } catch { err = { error: errText }; }
        setStatus("Sign-in failed: " + (err.error || res.statusText), "error");
        return;
      }

      const data = await res.json();
      console.log("[LOGIN] data", data);

      setToken(data.token);

      showSignedIn();
      await loadCounter();
    });

    // -------------------------
    // SIGNUP
    // -------------------------
    document.getElementById("signUpBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      console.log("[SIGNUP] click", { email });
      setStatus("Creating account...");

      const res = await fetch(`${API}/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      console.log("[SIGNUP] /signup status", res.status);

      const text = await res.text();
      console.log("[SIGNUP] body", text);

      if (!res.ok) {
        let err;
        try { err = JSON.parse(text); } catch { err = { error: text }; }
        setStatus("Sign-up failed: " + (err.error || res.statusText), "error");
        return;
      }

      setStatus("Account created. You can now sign in.", "success");
    });

    // -------------------------
    // AUTO LOGIN CHECK
    // -------------------------
    async function init() {
      console.log("[INIT] start");
      const token = getToken();
      if (!token) {
        console.log("[INIT] no token, signed out");
        showSignedOut();
        return;
      }

      console.log("[INIT] token exists, checking /session");
      const res = await fetch(`${API}/session`, { headers: authHeaders() });
      console.log("[INIT] /session status", res.status);

      const text = await res.text();
      console.log("[INIT] /session body", text);

      let data;
      try { data = JSON.parse(text); } catch { data = {}; }

      if (data.logged_in) {
        console.log("[INIT] logged_in true", data);
        showSignedIn();
        await loadCounter();
      } else {
        console.log("[INIT] logged_in false, clearing token");
        clearToken();
        showSignedOut();
      }
    }

    init();
  </script>
</body>
</html>
```
